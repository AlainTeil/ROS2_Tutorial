name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ROS_DISTRO: jazzy

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-${ROS_DISTRO}-ament-cmake-gtest \
            ros-${ROS_DISTRO}-example-interfaces \
            ros-${ROS_DISTRO}-rclcpp \
            ros-${ROS_DISTRO}-rclcpp-action \
            ros-${ROS_DISTRO}-rclcpp-components \
            ros-${ROS_DISTRO}-rclcpp-lifecycle \
            ros-${ROS_DISTRO}-std-msgs \
            ros-${ROS_DISTRO}-geometry-msgs \
            ros-${ROS_DISTRO}-sensor-msgs \
            ros-${ROS_DISTRO}-nav-msgs \
            ros-${ROS_DISTRO}-visualization-msgs \
            ros-${ROS_DISTRO}-lifecycle-msgs \
            ros-${ROS_DISTRO}-tf2 \
            ros-${ROS_DISTRO}-tf2-ros \
            ros-${ROS_DISTRO}-tf2-geometry-msgs \
            ros-${ROS_DISTRO}-robot-state-publisher \
            ros-${ROS_DISTRO}-joint-state-publisher-gui \
            ros-${ROS_DISTRO}-xacro \
            ros-${ROS_DISTRO}-urdf \
            ros-${ROS_DISTRO}-ament-lint-auto \
            ros-${ROS_DISTRO}-ament-index-cpp \
            ros-${ROS_DISTRO}-ros-gz-sim \
            ros-${ROS_DISTRO}-ros-gz-bridge

      - name: Build
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release --event-handlers console_direct+

      - name: Test
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find src/ -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-18 --dry-run --Werror --style=file

  clang-tidy:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            clang-tidy-18 \
            python3-colcon-common-extensions \
            ros-${ROS_DISTRO}-ament-cmake-gtest \
            ros-${ROS_DISTRO}-example-interfaces \
            ros-${ROS_DISTRO}-rclcpp \
            ros-${ROS_DISTRO}-rclcpp-action \
            ros-${ROS_DISTRO}-rclcpp-components \
            ros-${ROS_DISTRO}-rclcpp-lifecycle \
            ros-${ROS_DISTRO}-std-msgs \
            ros-${ROS_DISTRO}-geometry-msgs \
            ros-${ROS_DISTRO}-sensor-msgs \
            ros-${ROS_DISTRO}-nav-msgs \
            ros-${ROS_DISTRO}-visualization-msgs \
            ros-${ROS_DISTRO}-lifecycle-msgs \
            ros-${ROS_DISTRO}-tf2 \
            ros-${ROS_DISTRO}-tf2-ros \
            ros-${ROS_DISTRO}-tf2-geometry-msgs \
            ros-${ROS_DISTRO}-robot-state-publisher \
            ros-${ROS_DISTRO}-xacro \
            ros-${ROS_DISTRO}-urdf \
            ros-${ROS_DISTRO}-ament-lint-auto \
            ros-${ROS_DISTRO}-ament-index-cpp \
            ros-${ROS_DISTRO}-ros-gz-sim \
            ros-${ROS_DISTRO}-ros-gz-bridge

      - name: Build with compile_commands.json
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --cmake-args \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            --event-handlers console_direct+

      - name: Run clang-tidy
        shell: bash
        run: |
          find src/ -name '*.cpp' | \
            xargs clang-tidy-18 -p build/ --config-file=.clang-tidy 2>&1 | \
            tee clang-tidy-output.txt
          if grep -q "warning:" clang-tidy-output.txt; then
            echo "::warning::clang-tidy found issues"
          fi
